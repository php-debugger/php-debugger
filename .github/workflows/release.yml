name: Release

on:
    push:
        tags:
            - '*'

permissions:
    contents: write

jobs:
    build-unix:
        strategy:
            fail-fast: false
            matrix:
                os:
                    - macos-latest
                    - ubuntu-latest
                php-version:
                    - '8.2'
                    - '8.3'
                    - '8.4'
                    - '8.5'
        runs-on: ${{ matrix.os }}
        name: "Unix — PHP ${{ matrix.php-version }} — ${{ matrix.os }}"
        steps:
            -   uses: actions/checkout@v6

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php-version }}
                    coverage: none
                    extensions: xmlreader

            -   name: Build extension
                run: |
                    phpize
                    ./configure --enable-php-debugger
                    make -j$(sysctl -n hw.logicalcpu 2>/dev/null || nproc)

            -   name: Verify extension loads
                run: |
                    php -dzend_extension=$PWD/modules/php_debugger.so -v
                    php -dzend_extension=$PWD/modules/php_debugger.so -r "echo 'xdebug_info() works: ' . (function_exists('xdebug_info') ? 'yes' : 'no') . PHP_EOL;"

            -   name: Smoke test (DBGp)
                run: |
                    TEST_PHP_ARGS="-n -dzend_extension=$PWD/modules/php_debugger.so"
                    echo "TEST_PHP_ARGS=$TEST_PHP_ARGS" >> $GITHUB_ENV
                    export TEST_PHP_ARGS
                    php -n run-xdebug-tests.php -q tests/debugger/bug00530.phpt

            -   name: Package artifact
                id: package
                run: |
                    PHP_VER=$(php -r "echo PHP_MAJOR_VERSION . '.' . PHP_MINOR_VERSION;")
                    OS_TAG=$(echo "${{ matrix.os }}" | sed 's/-latest//')
                    ARCH=$(uname -m)
                    ASSET_NAME="php-debugger-php${PHP_VER}-${OS_TAG}-${ARCH}.so"
                    cp modules/php_debugger.so "${ASSET_NAME}"
                    echo "asset_name=${ASSET_NAME}" >> $GITHUB_OUTPUT

            -   name: Upload artifact
                uses: actions/upload-artifact@v4
                with:
                    name: ${{ steps.package.outputs.asset_name }}
                    path: ${{ steps.package.outputs.asset_name }}

    build-windows:
        strategy:
            fail-fast: false
            matrix:
                php-version:
                    - '8.2'
                    - '8.3'
                    - '8.4'
                    - '8.5'
                ts:
                  - nts
                  - ts
        runs-on: windows-2022
        name: "Windows — PHP ${{ matrix.php-version }} — ${{ matrix.ts == 'ts' && 'TS' || 'NTS' }}"
        steps:
            -   uses: actions/checkout@v6

            -   name: Build the extension
                uses: php/php-windows-builder/extension@v1
                with:
                    php-version: ${{ matrix.php-version }}
                    arch: x64
                    ts: ${{ matrix.ts }}
                    args: --enable-debugger
                    run-tests: false

            -   name: Package artifact
                id: package
                shell: pwsh
                run: |
                    $phpVer = "${{ matrix.php-version }}"
                    $tsTag = "${{ matrix.ts }}"
                    $assetName = "php-debugger-php${phpVer}-${tsTag}-windows-x64.dll"
                    $dll = Get-ChildItem -Path $env:RUNNER_TEMP -Recurse -Filter 'php_debugger.dll' -ErrorAction SilentlyContinue | Select-Object -First 1
                    if (-not $dll) {
                        $dll = Get-ChildItem -Recurse -Filter 'php_debugger.dll' -ErrorAction SilentlyContinue | Select-Object -First 1
                    }
                    if (-not $dll) { Write-Error "php_debugger.dll not found"; exit 1 }
                    Write-Host "Found DLL at: $($dll.FullName)"
                    Copy-Item $dll.FullName -Destination $assetName
                    echo "asset_name=${assetName}" >> $env:GITHUB_OUTPUT

            -   name: Upload artifact
                uses: actions/upload-artifact@v4
                with:
                    name: ${{ steps.package.outputs.asset_name }}
                    path: ${{ steps.package.outputs.asset_name }}

    release:
        needs: [build-unix, build-windows]
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v6

            -   name: Download all artifacts
                uses: actions/download-artifact@v4
                with:
                    path: artifacts

            -   name: Collect release assets
                run: |
                    mkdir release-assets
                    find artifacts -type f \( -name '*.so' -o -name '*.dll' \) -exec cp {} release-assets/ \;
                    ls -la release-assets/

            -   name: Create release
                uses: softprops/action-gh-release@v2
                with:
                    generate_release_notes: true
                    files: release-assets/*
